<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>中国联通</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            background: #e8e8e8;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 0;
        }

        /* 手机模拟框（仅用于电脑预览，在真实手机中此容器宽度自动占满） */
        .phone-frame {
            width: 100%;
            max-width: 480px;
            background: #fff;
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            position: relative;
            overflow-x: hidden;
        }

        /* 第一阶段页面 */
        #loading-page {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background: #fff;
        }

        /* --- 顶部导航条 --- */
        .top-bar {
            background: #f8f8f8;
            padding: 6px 16px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            font-size: 11px;
            color: #999;
            border-bottom: 1px solid #eee;
        }
        .top-bar span {
            margin-left: 10px;
            cursor: pointer;
        }
        .top-bar .separator {
            color: #ddd;
            cursor: default;
            margin: 0 2px;
        }

        /* --- 头部 --- */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: #fff;
            border-bottom: 1px solid #f0f0f0;
        }
        .logo-area {
            display: flex;
            align-items: center;
            text-decoration: none;
        }
        .logo-svg {
            width: 90px;
            height: 36px;
            margin-right: 0;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .header-right a {
            text-decoration: none;
            color: #333;
            font-size: 13px;
            white-space: nowrap;
        }
        .search-icon {
            width: 20px;
            height: 20px;
            cursor: pointer;
            opacity: 0.7;
        }

        /* --- 导航标签 --- */
        .nav-tabs {
            display: flex;
            overflow-x: auto;
            padding: 6px 16px;
            background: #fff;
            border-bottom: 2px solid #e60012;
            gap: 0;
            -webkit-overflow-scrolling: touch;
        }
        .nav-tabs::-webkit-scrollbar {
            display: none;
        }
        .nav-tabs .tab {
            flex-shrink: 0;
            padding: 8px 12px;
            font-size: 14px;
            color: #555;
            cursor: pointer;
            white-space: nowrap;
            position: relative;
        }
        .nav-tabs .tab.active {
            color: #e60012;
            font-weight: bold;
        }

        /* --- 新闻横幅 --- */
        .news-banner {
            background: #fafafa;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            font-size: 13px;
            color: #333;
            border-bottom: 1px solid #eee;
        }
        .news-banner .label {
            color: #e60012;
            font-weight: bold;
            margin-right: 8px;
            flex-shrink: 0;
        }
        .news-banner .text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- 主内容（加载动画） --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid #f0f0f0;
            border-top-color: #e60012;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin-bottom: 28px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            font-size: 17px;
            color: #222;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .loading-sub {
            font-size: 13px;
            color: #999;
        }

        /* --- 底部 --- */
        .footer {
            padding: 18px 16px;
            text-align: center;
            font-size: 11px;
            color: #aaa;
            border-top: 1px solid #f0f0f0;
            line-height: 1.6;
        }

        /* ========= 第二阶段：红色警告弹窗 ========= */
        #warning-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
        }
        .warning-card {
            background: #fff;
            border-radius: 14px;
            width: 90%;
            max-width: 360px;
            overflow: hidden;
            box-shadow: 0 24px 60px rgba(0,0,0,0.6);
            animation: popIn 0.4s ease-out;
        }
        @keyframes popIn {
            from { transform: scale(0.85); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .warning-header {
            background: #d32f2f;
            padding: 20px 16px 14px;
            text-align: center;
        }
        .warn-icon {
            font-size: 44px;
            margin-bottom: 6px;
        }
        .warn-title {
            font-size: 22px;
            font-weight: bold;
            color: #fff;
            letter-spacing: 2px;
        }
        .warning-body {
            padding: 20px 18px;
            background: #fff;
        }
        .warning-body .alert-text {
            font-size: 16px;
            font-weight: bold;
            color: #d32f2f;
            text-align: center;
            margin-bottom: 18px;
            line-height: 1.5;
        }
        .info-box {
            background: #fff5f5;
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 12px;
        }
        .info-row {
            display: flex;
            padding: 8px 0;
            border-bottom: 1px solid #ffe0e0;
            font-size: 13px;
            line-height: 1.5;
        }
        .info-row:last-child {
            border-bottom: none;
        }
        .info-label {
            color: #b71c1c;
            font-weight: bold;
            min-width: 75px;
            flex-shrink: 0;
        }
        .info-value {
            color: #333;
            word-break: break-all;
        }
        .permission-warn {
            color: #d32f2f;
            font-weight: bold;
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .warning-footer {
            padding: 0 18px 20px;
            text-align: center;
        }
        .btn-understand {
            width: 100%;
            padding: 12px;
            background: #d32f2f;
            color: #fff;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1px;
            transition: background 0.2s;
        }
        .btn-understand:active {
            background: #b71c1c;
        }
    </style>
</head>
<body>
    <!-- 手机模拟器外框（非必须，仅桌面预览用） -->
    <div class="phone-frame">

        <!-- ================= 第一阶段：加载页面 ================= -->
        <div id="loading-page">
            <!-- 顶部语言/登录条 -->
            <div class="top-bar">
                <span>简</span><span class="separator">|</span>
                <span>繁</span><span class="separator">|</span>
                <span>ENG</span><span class="separator">|</span>
                <span>登录</span>
            </div>

            <!-- 头部：Logo + 右侧链接 -->
            <div class="header">
                <a class="logo-area" href="javascript:void(0)">
                    <!-- 高仿真联通 Logo（SVG） -->
                    <img src="image.png" height="40" alt="中国联通">
                </a>
                <div class="header-right">
                    <a href="javascript:void(0)">个人中心</a>
                    <a href="javascript:void(0)">客户服务</a>
                    <!-- 搜索图标 -->
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2">
                        <circle cx="10.5" cy="10.5" r="6"/>
                        <line x1="15.5" y1="15.5" x2="21" y2="21"/>
                    </svg>
                </div>
            </div>

            <!-- 导航栏 -->
            <div class="nav-tabs">
                <span class="tab active">首页</span>
                <span class="tab">联通新闻</span>
                <span class="tab">信息公开</span>
                <span class="tab">招贤纳士</span>
                <span class="tab">联通视界</span>
                <span class="tab">新闻中心</span>
                <span class="tab">关于联通</span>
            </div>

            <!-- 新闻条 -->
            <div class="news-banner">
                <span class="label">联通要闻</span>
                <span class="text">中国联通“心联通、心满意”行风优质服务恳谈会在京召开</span>
            </div>

            <!-- 加载动画区 -->
            <div class="main-content">
                <div class="spinner"></div>
                <div class="loading-text">请稍等，正在加载中...</div>
                <div class="loading-sub">积分兑换页面即将呈现</div>
            </div>

            <!-- 底部版权 -->
            <div class="footer">
                中国联合网络通信集团有限公司 版权所有<br>
                Copyright © 2025 China United Network Communications Group Co.,Ltd.
            </div>
        </div>

        <!-- ================= 第二阶段：红色警告弹窗（默认隐藏） ================= -->
        <div id="warning-overlay">
            <div class="warning-card">
                <div class="warning-header">
                    <div class="warn-icon">⚠️</div>
                    <div class="warn-title">安全警告</div>
                </div>
                <div class="warning-body">
                    <div class="alert-text">您刚刚扫描了一个<br>涉诈二维码！！！</div>
                    <div class="info-box">
                        <div class="info-row">
                            <span class="info-label">手机型号</span>
                            <span class="info-value" id="device-model">识别中...</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">操作系统</span>
                            <span class="info-value" id="os-version">识别中...</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">IP 归属地</span>
                            <span class="info-value" id="ip-location">查询中...</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">相册权限</span>
                            <span class="info-value permission-warn">
                                ⚠ 该页面正在请求读取您的手机相册
                            </span>
                        </div>
                    </div>
                </div>
                <div class="warning-footer">
                    <button class="btn-understand" onclick="closeWarning()">我已知晓风险</button>
                </div>
            </div>
        </div>

    </div><!-- .phone-frame 结束 -->

    <script>
        (function() {
            // ---------- 获取设备信息 ----------
            function getDeviceInfo() {
                const ua = navigator.userAgent;
                let device = 'Unknown';
                let os = 'Unknown';

                // 操作系统
                if (/Windows NT 10/.test(ua)) os = 'Windows 10';
                else if (/Windows NT 6.3/.test(ua)) os = 'Windows 8.1';
                else if (/Windows NT 6.1/.test(ua)) os = 'Windows 7';
                else if (/Mac OS X/.test(ua)) {
                    os = 'macOS';
                    let v = ua.match(/Mac OS X (\d+[._]\d+)/);
                    if (v) os += ' ' + v[1].replace(/_/g, '.');
                }
                else if (/iPhone|iPad|iPod/.test(ua)) {
                    os = 'iOS';
                    let v = ua.match(/OS (\d+[._]\d+)/);
                    if (v) os += ' ' + v[1].replace(/_/g, '.');
                }
                else if (/Android/.test(ua)) {
                    let v = ua.match(/Android (\d+\.\d+)/);
                    os = v ? 'Android ' + v[1] : 'Android';
                }
                else if (/Linux/.test(ua)) os = 'Linux';

                // 设备型号
                if (/iPhone/.test(ua)) device = 'iPhone';
                else if (/iPad/.test(ua)) device = 'iPad';
                else if (/Android/.test(ua)) {
                    let m = ua.match(/; ([^;]+) Build\//);
                    if (m) device = m[1].trim();
                    else {
                        let m2 = ua.match(/; ([^;]+)\)/);
                        device = m2 ? m2[1].trim() : 'Android Device';
                    }
                }
                else if (/Windows/.test(ua)) device = 'PC / Windows';
                else if (/Macintosh/.test(ua)) device = 'Mac';

                return { device, os };
            }

            // ---------- 获取 IP 归属地 ----------
            async function fetchIPLocation() {
                try {
                    const res = await fetch('https://ipapi.co/json/', { method: 'GET' });
                    if (!res.ok) throw new Error('status ' + res.status);
                    const data = await res.json();
                    const parts = [];
                    if (data.country_name) parts.push(data.country_name);
                    if (data.region) parts.push(data.region);
                    if (data.city) parts.push(data.city);
                    if (data.ip) parts.push('(' + data.ip + ')');
                    return parts.length ? parts.join(' ') : '未知';
                } catch (e) {
                    console.warn('IP query failed, trying fallback');
                    try {
                        const fb = await fetch('https://api.ipify.org?format=json');
                        const fbData = await fb.json();
                        return 'IP: ' + fbData.ip + '（归属地查询受限）';
                    } catch (e2) {
                        return '查询失败（网络限制）';
                    }
                }
            }

            // ---------- 5 秒倒计时后显示警告 ----------
            setTimeout(async () => {
                const info = getDeviceInfo();
                document.getElementById('device-model').textContent = info.device;
                document.getElementById('os-version').textContent = info.os;

                // 异步获取 IP
                const ipLocation = await fetchIPLocation();
                document.getElementById('ip-location').textContent = ipLocation;

                // 切换显示
                document.getElementById('loading-page').style.display = 'none';
                document.getElementById('warning-overlay').style.display = 'flex';
            }, 5000);

            // ---------- 关闭警告弹窗（用于演示恢复） ----------
            window.closeWarning = function() {
                document.getElementById('warning-overlay').style.display = 'none';
                // 恢复加载页，方便连续演示
                document.getElementById('loading-page').style.display = 'flex';
            };
        })();
    </script>
</body>
</html>
